<!doctype html>
<html lang="fa">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>صفحه ثبت‌نام</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <form id="signupForm" class="card" aria-labelledby="signupTitle" novalidate>
      <h1 id="signupTitle">ثبت‌نام</h1>

      <label for="name">نام</label>
      <input id="name" name="name" type="text" placeholder="نام و نام خانوادگی" required>

      <label for="email">ایمیل</label>
      <input id="email" name="email" type="email" placeholder="user@example.com" required>

      <label for="password">رمز عبور</label>
      <input id="password" name="password" type="password" placeholder="رمز عبور" required>

      <label for="confirm">تکرار رمز عبور</label>
      <input id="confirm" name="confirm" type="password" placeholder="تکرار رمز عبور" required>

      <button type="submit" id="signupBtn">ثبت‌نام</button>

      <p id="message" role="status" aria-live="polite"></p>

      <small style="text-align:center; display:block; margin-top:8px;">حساب داری؟ <a href="index.html">ورود</a></small>
    </form>
  </main>

  <script src="register.js" defer></script>
</body>
</html>
