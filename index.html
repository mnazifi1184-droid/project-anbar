<!doctype html>
<html lang="fa">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>صفحه ورود</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <form id="loginForm" class="card" aria-labelledby="loginTitle" novalidate>
      <h1 id="loginTitle">ورود به حساب</h1>

      <label for="email">ایمیل</label>
      <input id="email" name="email" type="email" placeholder="user@example.com" required>

      <label for="password">رمز عبور</label>
      <input id="password" name="password" type="password" placeholder="رمز عبور" required>

      <button type="submit" id="submitBtn">ورود</button>

      <p id="message" role="status" aria-live="polite"></p>

      <small>برای تست: ایمیل <code>user@example.com</code> و رمز <code>password123</code></small>
    </form>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
